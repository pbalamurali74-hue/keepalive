name: Keep Streak Green

on:
  schedule:
    - cron: '5 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update heartbeat file
        run: |
          echo "$(date -u +%F) heartbeat" >> .keepalive

      - name: Commit and Push
        run: |
          git config user.name "pbalamurali74-hue"
          git config user.email "pbalamurali74@gmail.com"

          git add .keepalive

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Daily heartbeat"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
